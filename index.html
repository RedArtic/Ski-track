<html lang="en">
<head>

const manifest={name:'SkiTrack',short_name:'SkiTrack',description:'Free ski tracking — GPS, weather, community',start_url:location.href,display:'standalone',background_color:'#050A12',theme_color:'#050A12',orientation:'portrait',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect fill="%230EA5E9" rx="100" width="512" height="512"/><text x="256" y="370" font-size="280" text-anchor="middle">⛷️</text></svg>',sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});

</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&family=Azeret+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#050A12;font-family:'Geologica',sans-serif}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:#050A12;color:#CBD5E1;font-family:'Geologica',sans-serif;padding-top:env(safe-area-inset-top);position:relative}
/* Debug overlay */
:root{
--ice:#38BDF8;--ice-b:#7DD3FC;--ice-d:rgba(56,189,248,0.10);--ice-g:rgba(56,189,248,0.25);
--red:#F87171;--red-d:rgba(248,113,113,0.12);--red-g:rgba(248,113,113,0.3);
--grn:#34D399;--grn-d:rgba(52,211,153,0.12);--amb:#F59E0B;--amb-d:rgba(245,158,11,0.12);--pur:#A78BFA;--pur-d:rgba(167,139,250,0.12);
--bg0:#050A12;--bg1:#0A1019;--bg2:#0E1620;--bg3:#121E2D;--bg4:#182637;--bg5:#1C2E42;
--bd1:rgba(56,189,248,0.08);--bd2:rgba(56,189,248,0.12);--bd3:rgba(56,189,248,0.25);
--t1:#F1F5F9;--t2:#CBD5E1;--t3:#64748B;--t4:#475569;--fm:'Azeret Mono',monospace;
}
/* Splash */
#splash{position:absolute;inset:0;z-index:8000;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .7s,transform .7s}
#splash.out{opacity:0;transform:scale(1.03);pointer-events:none}
.sp-mk{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#0EA5E9,#38BDF8,#7DD3FC);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px var(--ice-g);animation:breathe 2.5s ease-in-out infinite;font-size:32px}
@keyframes breathe{0%,100%{box-shadow:0 0 50px var(--ice-g)}50%{box-shadow:0 0 70px rgba(56,189,248,.4)}}
.sp-t{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:16px;color:var(--t1)}.sp-s{font-size:11px;color:var(--t3);margin-top:4px}.sp-bar{width:120px;height:3px;background:var(--bg3);border-radius:3px;margin-top:28px;overflow:hidden}.sp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ice),var(--ice-b));border-radius:3px;animation:barGo 1.8s ease-out forwards}@keyframes barGo{to{width:100%}}
/* Header */
.hdr{padding:6px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--bg1);border-bottom:1px solid var(--bd1);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:7px}.hdr-i{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#0EA5E9,#7DD3FC);display:flex;align-items:center;justify-content:center;font-size:12px}.hdr-n{font-weight:700;font-size:15px;color:var(--t1)}
.gps-b{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-family:var(--fm)}
.gps-d{width:6px;height:6px;border-radius:50%;background:var(--grn)}.gps-d.off{background:var(--red)}.gps-d.wait{background:var(--amb);animation:blink 1s infinite}@keyframes blink{50%{opacity:.3}}
/* Pages */
.pages{flex:1;overflow:hidden;position:relative}
.pg{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}.pg.on{display:flex;animation:pgIn .2s ease}@keyframes pgIn{from{opacity:0}to{opacity:1}}
.pg-scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}.pg-scr::-webkit-scrollbar{width:0}
/* Nav */
.nav{display:flex;background:var(--bg1);border-top:1px solid var(--bd1);padding:5px 0 calc(5px + env(safe-area-inset-bottom));flex-shrink:0}
.nav-b{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;background:none;border:none;cursor:pointer;color:var(--t4);font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-family:'Geologica';transition:color .2s}
.nav-b svg{width:18px;height:18px;stroke-width:1.8}.nav-b.on{color:var(--ice)}.nav-b.on svg{filter:drop-shadow(0 0 5px var(--ice-g))}.nav-b.rec{color:var(--red)}
/* Map */
#mapWrap{flex:1;position:relative;background:var(--bg2)}#theMap{width:100%;height:100%;z-index:1}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.mf-tr{position:absolute;top:8px;right:8px;z-index:500;display:flex;flex-direction:column;gap:5px}
.mf-bl{position:absolute;bottom:8px;left:8px;z-index:500;display:flex;gap:4px}
.mb{width:34px;height:34px;border-radius:9px;background:rgba(10,16,25,.9);backdrop-filter:blur(10px);border:1px solid var(--bd2);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}.mb:active{transform:scale(.9)}.mb.on{border-color:var(--ice);color:var(--ice);background:rgba(56,189,248,.08)}
.lc{padding:4px 9px;border-radius:14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;background:rgba(10,16,25,.9);backdrop-filter:blur(10px);border:1px solid var(--bd2);color:var(--t3)}.lc.on{border-color:var(--ice);color:var(--ice);background:rgba(56,189,248,.08)}
/* Weather strip - NOW TAPPABLE */
.wx-strip{position:absolute;top:8px;left:8px;right:48px;z-index:500;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;cursor:pointer}.wx-strip::-webkit-scrollbar{display:none}
.wxc{min-width:72px;padding:6px 8px;border-radius:9px;flex-shrink:0;background:rgba(10,16,25,.9);backdrop-filter:blur(10px);border:1px solid var(--bd2);transition:border-color .15s}
.wx-strip:hover .wxc{border-color:var(--bd3)}
.wxc .wi{font-size:14px}.wxc .wt{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--t1);margin-top:1px}.wxc .wl{font-size:8px;color:var(--t3);text-transform:uppercase}
/* Search bar on map */
.map-search{position:absolute;top:8px;left:8px;right:48px;z-index:600;display:none}
.map-search.on{display:block}
.map-search input{width:100%;padding:9px 12px 9px 32px;background:rgba(10,16,25,.95);backdrop-filter:blur(12px);border:1px solid var(--bd3);border-radius:12px;color:var(--t1);font-size:13px;font-family:'Geologica';outline:none}
.map-search input::placeholder{color:var(--t4)}
.map-search .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3)}
.search-results{position:absolute;top:42px;left:0;right:0;background:rgba(10,16,25,.95);backdrop-filter:blur(12px);border:1px solid var(--bd2);border-radius:10px;max-height:200px;overflow-y:auto;display:none}
.search-results.on{display:block}
.sr-item{padding:10px 12px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:1px solid var(--bd1);display:flex;align-items:center;gap:6px}
.sr-item:last-child{border:none}.sr-item:active{background:var(--ice-d)}
.sr-item .sr-emoji{font-size:14px}
/* Resort panel */
.rp{position:absolute;bottom:44px;left:8px;right:8px;z-index:500;background:rgba(10,16,25,.95);backdrop-filter:blur(16px);border:1px solid var(--bd2);border-radius:14px;padding:14px;display:none;max-height:55%;overflow-y:auto}
.rp.on{display:block;animation:popUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes popUp{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.rp h3{font-size:14px;font-weight:700;color:var(--t1);padding-right:24px}
.rp-x{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--bg4);border:1px solid var(--bd2);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px}
.rp-tags{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.rp-t{font-size:10px;font-family:var(--fm);color:var(--t3);display:flex;align-items:center;gap:3px}
.rp-desc{font-size:11px;color:var(--t3);line-height:1.5;margin-top:8px}
.rp-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd1)}
.rp-section-title{font-size:9px;font-weight:700;color:var(--ice);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--fm);margin-bottom:6px}
.lift-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px}
.lift-dot{width:7px;height:7px;border-radius:50%}.lift-dot.open{background:var(--grn)}.lift-dot.closed{background:var(--red)}.lift-dot.hold{background:var(--amb)}
.lift-name{color:var(--t2);flex:1}.lift-status{color:var(--t3);font-family:var(--fm);font-size:9px;text-transform:uppercase}
.trail-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.trail-count{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:8px;background:var(--bg4);font-size:10px;font-weight:600}
.trail-count .tc-dot{width:10px;height:10px;border-radius:2px}.tc-green{background:#22C55E}.tc-blue{background:#3B82F6}.tc-black{background:#1E293B;border:1px solid #64748B}
.trail-count .tc-nums{color:var(--t1)}.trail-count .tc-lbl{color:var(--t3);font-size:8px;margin-left:auto}
.rp-btn{width:100%;padding:8px;border:1px solid var(--bd2);border-radius:8px;background:var(--bg4);color:var(--ice);font-size:11px;font-weight:600;cursor:pointer;font-family:'Geologica';margin-top:8px;text-align:center}
/* Track */
.trk-in{padding:0 14px 80px}
.t-hero{text-align:center;padding:20px 0 12px;position:relative}
.t-hero::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,var(--ice-d) 0%,transparent 70%);pointer-events:none;transition:all .4s}
.t-hero.live::before{background:radial-gradient(circle,var(--red-d) 0%,transparent 70%)}.t-hero.paused::before{background:radial-gradient(circle,rgba(245,158,11,.1) 0%,transparent 70%)}
.t-clk{font-family:var(--fm);font-size:44px;font-weight:400;color:var(--t1);letter-spacing:2px;position:relative}.t-clk .fr{font-size:20px;color:var(--t4)}
.t-lbl{font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:2px;margin-top:4px}.t-lbl.live{color:var(--red);animation:ptxt 2s ease-in-out infinite}.t-lbl.paused{color:var(--amb)}@keyframes ptxt{50%{opacity:.5}}
.t-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd1);border-radius:14px;overflow:hidden;margin-top:14px}
.tc{background:var(--bg2);padding:12px 8px;text-align:center}.tc .tv{font-family:var(--fm);font-size:18px;font-weight:600;color:var(--t1)}.tc .tu{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.t-acts{display:flex;gap:12px;justify-content:center;margin-top:18px;align-items:center}
.br{border-radius:50%;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-weight:700;color:white}.br:active{transform:scale(.9)}
.br-go{width:66px;height:66px;font-size:12px;text-transform:uppercase;letter-spacing:1px;background:linear-gradient(135deg,#0EA5E9,#38BDF8);box-shadow:0 0 30px var(--ice-g);font-family:'Geologica'}
.br-go.rec{background:linear-gradient(135deg,#EF4444,#F87171);box-shadow:0 0 30px var(--red-g)}.br-go.psd{background:linear-gradient(135deg,#22C55E,#34D399)}
.br-s{width:44px;height:44px;font-size:15px;background:var(--bg4);border:1px solid var(--bd2)}
.lap-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);background:rgba(56,189,248,.15);border:2px solid var(--ice);border-radius:16px;padding:14px 24px;font-family:var(--fm);font-size:14px;font-weight:600;color:var(--ice-b);z-index:8500;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(10px)}.lap-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.elev-box{margin-top:16px;height:56px;background:var(--bg3);border-radius:10px;border:1px solid var(--bd1);overflow:hidden;position:relative;display:none}
.elev-box canvas{width:100%;height:100%;display:block}.elev-box .el-lbl{position:absolute;top:4px;left:6px;font-size:8px;font-family:var(--fm);color:var(--t4);text-transform:uppercase}
.t-hint{text-align:center;margin-top:16px;font-size:10px;color:var(--t4);line-height:1.6;padding:0 16px}.t-hint b{color:var(--t3)}
/* Shared UI */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.sx{background:var(--bg2);border-radius:10px;padding:11px;border:1px solid var(--bd1)}.sx .si{font-size:14px;margin-bottom:3px}.sx .sv{font-family:var(--fm);font-size:17px;font-weight:600;color:var(--t1)}.sx .sl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.sx.hl{border-color:var(--ice);background:var(--ice-d)}.sx.hl .sv{color:var(--ice-b)}
.cs{background:var(--bg3);border:1px solid var(--bd1);border-radius:13px;padding:14px;margin-bottom:10px}.cs .ct{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.fg{margin-bottom:10px}.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:9px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.fi{width:100%;padding:8px 10px;background:var(--bg4);border:1px solid var(--bd2);border-radius:8px;color:var(--t2);font-size:13px;font-family:'Geologica';outline:none}.fi:focus{border-color:var(--ice)}
textarea.fi{min-height:50px;resize:vertical}
.chs{display:flex;flex-wrap:wrap;gap:5px}
.ch{padding:6px 11px;border-radius:16px;font-size:10px;font-weight:600;background:var(--bg4);border:1px solid var(--bd2);color:var(--t3);cursor:pointer;text-transform:uppercase;letter-spacing:.4px}.ch:active{transform:scale(.94)}.ch.on{background:var(--ice-d);border-color:var(--ice);color:var(--ice)}
.btn-p{width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#0EA5E9,#38BDF8);color:var(--bg0);font-family:'Geologica';font-size:13px;font-weight:700;cursor:pointer}
.btn-g{width:100%;padding:10px;border:1px solid var(--bd2);border-radius:10px;background:var(--bg4);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Geologica'}
.btn-d{width:100%;padding:10px;border:1px solid rgba(248,113,113,.2);border-radius:10px;background:var(--red-d);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'Geologica';margin-top:6px}
.tg{font-size:8px;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;background:var(--bg4);border:1px solid var(--bd1);color:var(--t3)}.tg.sn{background:var(--ice-d);border-color:rgba(56,189,248,.15);color:var(--ice)}.tg.pw{background:var(--pur-d);color:var(--pur)}.tg.wr{background:var(--amb-d);color:var(--amb)}
.rc{background:var(--bg3);border:1px solid var(--bd1);border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}.rc:active{transform:scale(.985)}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start}.rc-top h4{font-size:13px;font-weight:700;color:var(--t1)}.rc-top .rc-dt{font-size:9px;font-family:var(--fm);color:var(--t4)}
.rc-res{font-size:10px;color:var(--t3);margin-top:2px}.rc-row{display:flex;gap:14px;margin-top:8px}.rc-s .rv{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--t1)}.rc-s .rl{font-size:8px;color:var(--t4);text-transform:uppercase}
.rc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}.rc-note{font-size:10px;color:var(--t3);margin-top:6px;font-style:italic}
.empty-st{text-align:center;padding:36px 20px;color:var(--t4)}.empty-st .es-i{font-size:36px;margin-bottom:8px}.empty-st p{font-size:12px;line-height:1.5}
/* Run detail page */
/* Auth screen */
#authScreen{position:absolute;inset:0;z-index:7500;background:var(--bg0);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#authScreen.on{display:flex}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-title{font-size:24px;font-weight:700;color:var(--t1);margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--t3);margin-bottom:24px;text-align:center}
.auth-form{width:100%;max-width:320px}
.auth-form .fg{margin-bottom:12px}
.auth-form .fi{padding:12px 14px;font-size:14px;border-radius:12px}
.auth-toggle{text-align:center;margin-top:16px;font-size:12px;color:var(--t3)}
.auth-toggle span{color:var(--ice);cursor:pointer;font-weight:600}
.auth-err{color:var(--red);font-size:11px;text-align:center;margin-top:8px;min-height:16px}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--t4);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--bd2)}
.btn-auth-guest{width:100%;padding:12px;border:1px solid var(--bd2);border-radius:12px;background:var(--bg3);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Geologica'}
/* Run detail page */
.rd-back{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ice);cursor:pointer;margin-bottom:12px;padding:4px 0}
.rd-back:active{opacity:.6}
.rd-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.rd-resort{font-size:12px;color:var(--ice);font-family:var(--fm);margin-top:2px}
.rd-date{font-size:11px;color:var(--t4);margin-top:2px}
.rd-rating{margin-top:4px;font-size:13px}
.rd-minimap{width:100%;height:160px;border-radius:12px;overflow:hidden;margin-top:12px;border:1px solid var(--bd2);background:var(--bg3)}
.rd-minimap #rdMap{width:100%;height:100%}
.rd-no-gps{width:100%;height:80px;border-radius:12px;margin-top:12px;border:1px solid var(--bd1);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t4)}
.rd-elev{width:100%;height:56px;border-radius:10px;margin-top:8px;border:1px solid var(--bd1);background:var(--bg3);overflow:hidden;position:relative}
.rd-elev canvas{width:100%;height:100%;display:block}
.rd-elev .re-lbl{position:absolute;top:4px;left:6px;font-size:8px;font-family:var(--fm);color:var(--t4);text-transform:uppercase}
